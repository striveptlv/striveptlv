<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STRIVE Page</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --forest: #0d2118;
  --green: #1e8a4a;
  --green-light: #2faa5e;
  --text-mid: #2e5040;
}

/* BASE */
body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  padding-top: 70px; /* prevents nav overlap */
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 70px;
  background: rgba(13,33,24,0.97);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5vw;
  z-index: 1000;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-img {
  width: 44px;
}

.logo-text {
  font-family: 'Cormorant Garamond', serif;
  color: white;
  letter-spacing: 2px;
}

.logo-sub {
  font-size: 10px;
  color: var(--green-light);
}

.nav-links {
  display: flex;
  gap: 22px;
}

.nav-links a {
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 14px;
}

.nav-book {
  background: var(--green);
  color: white !important;
  padding: 8px 18px;
}

/* MOBILE MENU */
.nav-toggle {
  display: none;
  flex-direction: column;
  cursor: pointer;
}
.nav-toggle span {
  width: 22px;
  height: 2px;
  background: white;
  margin: 3px 0;
}

.mobile-menu {
  display: none;
  position: fixed;
  top: 70px;
  left: 0; right: 0;
  background: var(--forest);
  flex-direction: column;
  padding: 20px;
}
.mobile-menu.open {
  display: flex;
}
.mobile-menu a {
  color: white;
  padding: 12px 0;
  text-decoration: none;
}

/* PAGE CONTENT WRAPPER */
.page-content {
  padding: 60px 5vw;
}

/* FOOTER */
footer {
  background: var(--forest);
  color: white;
  padding: 60px 5vw 30px;
  margin-top: 60px;
}

.footer-inner {
  max-width: 1100px;
  margin: auto;
}

.footer-top {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 40px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding-bottom: 30px;
}

.footer-col h4 {
  font-size: 12px;
  letter-spacing: 2px;
  margin-bottom: 12px;
}

.footer-col a {
  display: block;
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  margin-bottom: 8px;
}

.footer-bottom {
  margin-top: 20px;
  font-size: 12px;
  color: rgba(255,255,255,0.4);
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .nav-links { display: none; }
  .nav-toggle { display: flex; }
  .footer-top { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<!-- ================= NAV ================= -->
<nav>
  <a href="https://striveptlv.com" class="nav-logo">
    <img src="https://striveptlv.com/logo.png" class="logo-img">
    <div>
      <div class="logo-text">STRIVE</div>
      <div class="logo-sub">Physical Therapy · Las Vegas</div>
    </div>
  </a>

  <div class="nav-links">
    <a href="https://striveptlv.com/">Home</a>
    <a href="https://striveptlv.com/#services">Services</a>
    <a href="https://striveptlv.com/#contact">Contact</a>
    <a href="https://striveptlv.com/" class="nav-book">Book Now</a>
  </div>

  <div class="nav-toggle" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
</nav>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
  <a href="https://striveptlv.com">Home</a>
  <a href="https://striveptlv.com/#services">Services</a>
  <a href="https://striveptlv.com/#contact">Contact</a>
</div>


<!-- ================= PAGE CONTENT ================= -->
<div class="page-content">

  <!-- 🔻🔻🔻 PASTE YOUR PAGE CONTENT HERE 🔻🔻🔻 -->


  <!-- Example -->
  <h1>Your Page Title</h1>
  <p>This is where your custom content goes.</p>


  <!-- 🔺🔺🔺 END PAGE CONTENT 🔺🔺🔺 -->

</div>


<!-- ================= FOOTER ================= -->
<footer>
  <div class="footer-inner">

    <div class="footer-top">

      <div>
        <div class="logo-text">STRIVE</div>
        <p>1-on-1 physical therapy in Las Vegas.</p>
      </div>

      <div class="footer-col">
        <h4>Practice</h4>
        <a href="#">Services</a>
        <a href="#">Team</a>
      </div>

      <div class="footer-col">
        <h4>Contact</h4>
        <a href="#">Book Appointment</a>
      </div>

    </div>

    <div class="footer-bottom">
      © 2026 STRIVE Physical Therapy · Las Vegas, NV
    </div>

  </div>
</footer>


<script>
function toggleMenu() {
  document.getElementById('mobileMenu').classList.toggle('open');
}
</script>

</body>
</html>
